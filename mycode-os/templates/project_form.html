{% extends "layout.html" %}
{% block title %}{{ mode }} Project - MyCode OS{% endblock %}
{% block heading %}{{ mode }} Project{% endblock %}
{% block content %}
<section class="panel narrow">
    <form method="post" class="form">
        <label>Client
            <select name="client_id" required>
                <option value="">Select client</option>
                {% for client in clients %}
                <option value="{{ client.id }}" {% if project.client_id|string == client.id|string %}selected{% endif %}>
                    {{ client.name }}{% if client.company %} - {{ client.company }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </label>
        <label>Project name
            <input name="name" value="{{ project.name or '' }}" required>
        </label>
        <div class="form-grid">
            <label>Type
                <input name="type" value="{{ project.type or '' }}" placeholder="Landing page, ecommerce, redesign...">
            </label>
            <label>Status
                <select name="status" required>
                    {% for status in statuses %}
                    <option value="{{ status }}" {% if (project.status or 'New') == status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>
        <div class="form-grid">
            <label>Budget
                <input type="number" step="0.01" min="0" name="budget" value="{{ project.budget or 0 }}">
            </label>
            <label>Paid amount reference
                <input type="number" step="0.01" min="0" name="paid_amount" value="{{ project.paid_amount or 0 }}">
            </label>
        </div>
        <div class="form-grid">
            <label>Start date
                <input type="date" name="start_date" value="{{ project.start_date or '' }}">
            </label>
            <label>Deadline
                <input type="date" name="deadline" value="{{ project.deadline or '' }}">
            </label>
        </div>
        <label>Technologies
            <input name="technologies" value="{{ project.technologies or '' }}" placeholder="Flask, SQLite, HTML, CSS...">
        </label>
        <label>Description
            <textarea name="description" rows="5">{{ project.description or '' }}</textarea>
        </label>
        <div class="form-actions">
            <a class="btn ghost" href="{{ url_for('projects') }}">Cancel</a>
            <button class="btn primary" type="submit">{{ mode }} Project</button>
        </div>
    </form>
</section>
{% endblock %}
